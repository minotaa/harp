lavalink:
  server:
    password: "password123"
    trackStuckThresholdMs: 30000
    sources:
      youtube: false
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases" # this is optional for lavalink v4.0.0-beta.5 or greater
      snapshot: false # set to true if you want to use snapshot builds (see below)
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.13.5"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED 
  lavasrc:
    sources:
      spotify: true
      applemusic: true
      ytdlp: true

    spotify:
      clientId: ""
      clientSecret: ""
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
    ytdlp:
      path: "./yt-dlp"
      searchLimit: 10
      mixPlaylistLoadLimit: 25 # The number of tracks each for mix playlists. Default is 25 tracks
      playlistLoadLimit: 1000 # The number of tracks each for normal playlists. Default is 1000 tracks
      customLoadArgs: ["-q", "--no-warnings", "--flat-playlist", "--skip-download", "-J"] # Custom arguments to pass to yt-dlp
      customPlaybackArgs: ["-q", "--no-warnings", "-f", "bestaudio", "-J"] # Custom arguments for yt-dlp
logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO
